name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/brainery --ignore-missing-imports
        continue-on-error: true   # Non-blocking until type coverage improves

      - name: Run tests with coverage
        run: pytest tests/ --cov=brainery --cov-report=term-missing

      - name: Verify CLI entry point works
        run: kb --version

      - name: Verify package imports cleanly
        run: python -c "import brainery; print(f'brainery {brainery.__version__} OK')"
